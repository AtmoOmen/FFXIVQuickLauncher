name: Build XIVLauncher
on: [push, pull_request]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build-release:
    name: Build Release on Windows
    runs-on: windows-latest
    if: "startsWith(github.ref, 'refs/tags/')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Initialize Submodules
        run: git submodule update --init --recursive

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Restore Nuget Packages
        run: |
          cd .\src\
          dotnet restore
          cd ..

      - name: Define VERSION
        run: |
          $env:COMMIT = $env:GITHUB_SHA.Substring(0, 7)
          $env:REPO_NAME = $env:GITHUB_REPOSITORY -replace '.*/'
          $env:BRANCH = $env:GITHUB_REF -replace '.*/'

          ($env:REPO_NAME) >> VERSION
          ($env:BRANCH) >> VERSION
          ($env:COMMIT) >> VERSION

      - name: Build Release
        run: |
          cd .\src\
          dotnet build XIVLauncher.slnx -c Release

      - name: Generate Hashes File
        run: .\scripts\CreateHashList.ps1 .\src\bin\win-x64

      - name: Velopack Build and Upload
        id: build-velopack
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          $refver = $env:GITHUB_REF -replace '.*/'
          echo "::set-output name=version::$refver"

          cd src\
          .\..\scripts\ci-velopack-upload.ps1

  build:
    name: Build on Windows
    runs-on: windows-latest
    if: "!startsWith(github.ref, 'refs/tags/')"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Initialize Submodules
        run: git submodule update --init --recursive
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          
      - name: Restore Nuget Packages
        run: |
          cd .\src\
          dotnet restore
          cd ..

      - name: Define VERSION
        run: |
          $env:COMMIT = $env:GITHUB_SHA.Substring(0, 7)
          $env:REPO_NAME = $env:GITHUB_REPOSITORY -replace '.*/'
          $env:BRANCH = $env:GITHUB_REF -replace '.*/'

          ($env:REPO_NAME) >> VERSION
          ($env:BRANCH) >> VERSION
          ($env:COMMIT) >> VERSION

      - name: Build Release
        run: |
          cd .\src\
          dotnet build XIVLauncher.slnx -c ReleaseNoUpdate

      - name: Generate Hashes File
        run: .\scripts\CreateHashList.ps1 .\src\bin

      - name: Upload artifact
        uses: actions/upload-artifact@master
        with:
          name: xivlauncher-artifact
          path: src\bin\
